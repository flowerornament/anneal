name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Installer
        run: |
          bash -n install.sh
          bash install.sh --help >/dev/null
          bash install.sh --print-target >/dev/null
          bash install.sh --dry-run >/dev/null

      - name: Installer smoke test
        run: |
          tmpdir="$(mktemp -d)"
          INSTALL_DIR="$tmpdir" bash install.sh
          "$tmpdir/anneal" --version

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

  nix-home-manager-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Home Manager module smoke test
        run: bash scripts/test-home-manager-module.sh
