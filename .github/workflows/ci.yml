name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Installer
        run: |
          bash -n install.sh
          bash install.sh --help >/dev/null
          bash install.sh --print-target >/dev/null
          bash install.sh --dry-run >/dev/null

      - name: Installer smoke test
        run: |
          # Pin to the version in Cargo.toml instead of "latest" — the
          # Release workflow runs in parallel with CI on a tag push, so
          # "latest" races and fetches the previous release's SKILL.md.
          # Wait (up to 3 minutes) for the matching release to publish.
          version=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          tag="v$version"
          repo="${{ github.repository }}"

          for attempt in $(seq 1 36); do
            if curl -sf -o /dev/null "https://api.github.com/repos/$repo/releases/tags/$tag"; then
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::release $tag not published after 180s — Release workflow may have failed"
              exit 1
            fi
            echo "waiting for release $tag (attempt $attempt/36)..."
            sleep 5
          done

          tmpdir="$(mktemp -d)"
          INSTALL_DIR="$tmpdir/bin" bash install.sh --tag "$tag" --skill-target "$tmpdir/skills/anneal"
          "$tmpdir/bin/anneal" --version
          diff -ru skills/anneal "$tmpdir/skills/anneal"

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

  nix-home-manager-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Home Manager module smoke test
        run: bash scripts/test-home-manager-module.sh
